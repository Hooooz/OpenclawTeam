services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-openclaw}
      POSTGRES_USER: ${POSTGRES_USER:-openclaw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openclaw}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  control-api:
    build:
      context: ../..
      dockerfile: apps/control-api/Dockerfile
    environment:
      HOST: 0.0.0.0
      PORT: 3001
    depends_on:
      - postgres
      - redis
    ports:
      - "3001:3001"

  admin-web:
    build:
      context: ../..
      dockerfile: apps/admin-web/Dockerfile
    environment:
      VITE_API_BASE_URL: http://control-api:3001
    depends_on:
      - control-api
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  redis_data:
